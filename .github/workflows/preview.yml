name: Preview (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        id: deploy-workers-preview
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "Deployed preview pages by GitHub Actions branch ${{ github.ref_name }}"

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: >-
          ${{ steps.deploy-workers-preview.outcome == 'success' }}
        with:
          header: preview-deployment
          hide_and_recreate: true
          hide_classify: 'OUTDATED'
          message: |
            ## 🚀 Deploying ${{ github.event.repository.name }} with Cloudflare Workers
            <table>
              <tr>
                <th scope="row">Workers Preview URL</th>
                <td><a href="${{ steps.deploy-workers-preview.outputs.deployment-url }}" target="_blank" rel="noopener noreferrer">${{ steps.deploy-workers-preview.outputs.deployment-url }}</a></td>
              </tr>
            </table>
