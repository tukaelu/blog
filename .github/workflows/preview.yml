name: Preview (Pull Request)

on:
  pull_request:
    branches: [main]

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320 # v5.0.0
        with:
          version: 10
          run_install: false

      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        id: deploy-workers-preview
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: versions upload --message "Deployed preview pages by GitHub Actions branch ${{ github.ref_name }}"

      - uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        if: >-
          ${{ steps.deploy-workers-preview.outcome == 'success' }}
        with:
          header: preview-deployment
          hide_and_recreate: true
          hide_classify: 'OUTDATED'
          message: |
            ## 🚀 Deploying ${{ github.event.repository.name }} with Cloudflare Workers
            <table>
              <tr>
                <th scope="row">Workers Preview URL</th>
                <td><a href="${{ steps.deploy-workers-preview.outputs.deployment-url }}" target="_blank" rel="noopener noreferrer">${{ steps.deploy-workers-preview.outputs.deployment-url }}</a></td>
              </tr>
            </table>
